<div class="login-page-wrapper">
    <div class="login-card glass-card">
        <div class="login-header">
            <img src="logo.png" alt="Logo" class="login-logo">
            <h2 class="login-title">Admin Access</h2>
            <p class="login-subtitle">Please sign in to continue</p>
        </div>

        <form (ngSubmit)="onSubmit()" class="login-form">
            <div class="modern-input-group">
                <i class="fa fa-user input-icon"></i>
                <input type="text" id="username" [(ngModel)]="username" name="username" placeholder="Username" required autocomplete="username">
            </div>

            <div class="modern-input-group">
                <i class="fa fa-lock input-icon"></i>
                <input type="password" id="password" [(ngModel)]="password" name="password" placeholder="Password" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn-login">
                <span>Sign In</span>
                <i class="fa fa-arrow-right"></i>
            </button>
        </form>

        <div *ngIf="errorMessage" class="error-toast">
            <i class="fa fa-exclamation-circle"></i>
            {{ errorMessage }}
        </div>
    </div>
</div>
