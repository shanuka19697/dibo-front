<div class="search-data-container">
    <h1 class="search-heading">Search Student Records</h1>

    <div class="search-bar-container">
        <input type="text" [(ngModel)]="searchIndex" placeholder="Enter Index Number (e.g. 101)" class="search-input-field">
        <button class="btn-search" (click)="searchData()">Search</button>
    </div>

    <div class="student-results-grid" *ngIf="filteredData.length > 0">
        <div class="student-card" *ngFor="let student of filteredData">
            <div class="student-photo-container">
                <img [src]="student.StudentPhoto || 'no-photo.png'" class="student-photo" alt="{{ student.StudentName }}">
            </div>
            
            <div class="student-details">
                <h3 class="student-name">{{ student.StudentName }}</h3>
                <div class="detail-row">
                    <span class="detail-label">Class</span>
                    <span class="detail-value">{{ student.Class }}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Index Num</span>
                    <span class="detail-value">{{ student.sIndexNum }}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Agreement</span>
                    <span class="detail-value">{{ student.AgreementEndDate | date:'shortDate' }}</span>
                </div>
                
                <a [routerLink]="['/admin/view-data', student._id]" class="btn-view-profile">View Full Profile</a>
            </div>
        </div>
    </div>

    <div class="no-data" *ngIf="searchSubmitted && filteredData.length === 0">
        <p>No results found for Index Number "{{ searchIndex }}"</p>
    </div>
</div>
