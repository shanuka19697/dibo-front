<div class="d-flex justify-content-center">
  <div class="add-data-section m-5 p-5 col-7">
    <h2 class="text-center form-title">නව දත්ත ඇතුලත් කිරීම</h2>
    <div class="container">
      <form [formGroup]="addDataForm" (ngSubmit)="onSubmit()" class="row g-3">
        <div class="form-group col-md-6">
          <label class="form-label">දිනය</label>
          <input type="date" class="form-control" formControlName="Date">
          <div *ngIf="f['Date'].touched && f['Date'].invalid && f['Date'].errors && f['Date'].errors['required']"
            class="error">
            දිනය අත්‍යවශ්‍යයි
          </div>
        </div>

        <div class="form-group col-md-6">
          <label class="form-label">සිසුවාගේ නම</label>
          <input type="text" class="form-control" formControlName="StudentName">
          <div *ngIf="f['StudentName'].touched && f['StudentName'].invalid && f['StudentName'].errors && f['StudentName'].errors['required']"
            class="error">
            සිසුවාගේ නම අත්‍යවශ්‍යයි
          </div>
        </div>

        <div class="form-group col-md-6">
          <label class="form-label">පන්තිය</label>
          <input type="text" class="form-control" formControlName="Class">
          <div *ngIf="f['Class'].touched && f['Class'].invalid && f['Class'].errors && f['Class'].errors['required']"
            class="error">
            පන්තිය අත්‍යවශ්‍යයි
          </div>
        </div>

        <div class="form-group col-md-6">
          <label class="form-label">විභාග අංකය‍</label>
          <input type="number" class="form-control" formControlName="sIndexNum">
          <div *ngIf="f['sIndexNum'].touched && f['sIndexNum'].invalid && f['sIndexNum'].errors && f['sIndexNum'].errors['required']"
            class="error">
            විභාග අංකය‍ අත්‍යවශ්‍යයි
          </div>
          <div *ngIf="f['sIndexNum'].touched && f['sIndexNum'].invalid && f['sIndexNum'].errors && f['sIndexNum'].errors['min']"
            class="error">
            විභාග අංකය‍ නිවැරදි නොවේ
          </div>
        </div>

        <div class="form-group col-md-6">
          <label class="form-label">කාරණාව</label>
          <input type="text" class="form-control" formControlName="Reason">
          <div *ngIf="f['Reason'].touched && f['Reason'].invalid && f['Reason'].errors && f['Reason'].errors['required']"
            class="error">
            කාරණාව අත්‍යවශ්‍යයි
          </div>
        </div>

        <div class="form-group col-md-6">
          <label class="form-label">පන්ති භාර ගුරුතුමාගේ ගුරු අංකය</label>
          <input type="text" class="form-control" formControlName="TeacherID">
          <div *ngIf="f['TeacherID'].touched && f['TeacherID'].invalid && f['TeacherID'].errors && f['TeacherID'].errors['required']"
            class="error">
            පන්ති භාර ගුරුතුමාගේ ගුරු අංකය අත්‍යවශ්‍යයි
          </div>
        </div>

        <div class="form-group col-md-6">
          <label class="form-label">එකග තාවය</label>
          <input type="text" class="form-control" formControlName="Agreement">
          <div *ngIf="f['Agreement'].touched && f['Agreement'].invalid && f['Agreement'].errors && f['Agreement'].errors['required']"
            class="error">
            එකග තාවය අත්‍යවශ්‍යයි
          </div>
        </div>

        <div class="form-group col-md-6">
          <label class="form-label">එකග තාවය අවසන් වන දිනය</label>
          <input type="date" class="form-control" formControlName="AgreementEndDate">
          <div *ngIf="f['AgreementEndDate'].touched && f['AgreementEndDate'].invalid && f['AgreementEndDate'].errors && f['AgreementEndDate'].errors['required']"
            class="error">
            එකග තාවය අවසන් වන දිනය අත්‍යවශ්‍යයි
          </div>
        </div>

        <div class="form-group col-md-6">
          <label class="form-label">නිරීක්ෂකයාලගේ ගුරු අංකය</label>
          <input type="text" class="form-control" formControlName="ObserverTeacherID">
          <div *ngIf="f['ObserverTeacherID'].touched && f['ObserverTeacherID'].invalid && f['ObserverTeacherID'].errors && f['ObserverTeacherID'].errors['required']"
            class="error">
            නිරීක්ෂකයාලගේ ගුරු අංකය අත්‍යවශ්‍යයි
          </div>
        </div>

        <div class="col-12 text-end mt-5">
          <button type="button" routerLink="/admin" class="btn btn-secondary me-2">Cancel</button>
          <button type="submit" [disabled]="!addDataForm.valid" class="btn btn-primary">
            Submit <i *ngIf="isDataUploading" class="fa fa-spinner fa-pulse fa-fw" style="color: azure;"></i>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
