<div class="form-wrapper">
  <div class="glass-form-card">
    <h2 class="form-title">Add New Student Data</h2>
    <form [formGroup]="addDataForm" (ngSubmit)="onSubmit()" class="modern-form row g-4">
      <div class="form-group col-md-6">
        <label>Date</label>
        <input type="date" class="form-control" formControlName="Date">
        <div *ngIf="f['Date'].touched && f['Date'].invalid" class="text-danger small mt-1">
          Date is required
        </div>
      </div>

      <div class="form-group col-md-6">
        <label>Student Name</label>
        <input type="text" class="form-control" formControlName="StudentName" placeholder="Enter full name">
        <div *ngIf="f['StudentName'].touched && f['StudentName'].invalid" class="text-danger small mt-1">
          Student Name is required
        </div>
      </div>

      <div class="form-group col-md-4">
        <label>Class</label>
        <input type="text" class="form-control" formControlName="Class" placeholder="e.g. 10-A">
        <div *ngIf="f['Class'].touched && f['Class'].invalid" class="text-danger small mt-1">
          Class is required
        </div>
      </div>

      <div class="form-group col-md-8">
        <label>Student Photo</label>
        <div class="photo-upload-zone" (click)="fileInput.click()">
          <i class="fa fa-cloud-upload me-2"></i>
          <span>{{ addDataForm.get('StudentPhoto')?.value ? 'Photo Selected' : 'Click to Upload Photo' }}</span>
          <input #fileInput type="file" class="d-none" accept="image/*" (change)="onFileSelected($event)">
        </div>
      </div>

      <div class="form-group col-md-6">
        <label>Index Number</label>
        <input type="number" class="form-control" formControlName="sIndexNum" placeholder="e.g. 12345">
        <div *ngIf="f['sIndexNum'].touched && f['sIndexNum'].invalid" class="text-danger small mt-1">
          Valid Index Number (min 11111) is required
        </div>
      </div>

      <div class="form-group col-md-6">
        <label>Reason</label>
        <input type="text" class="form-control" formControlName="Reason" placeholder="Reason for data entry">
      </div>

      <div class="form-group col-md-6">
        <label>Teacher ID</label>
        <input type="text" class="form-control" formControlName="TeacherID" placeholder="Enter Teacher ID">
      </div>

      <div class="form-group col-md-6">
        <label>Observer Teacher ID</label>
        <input type="text" class="form-control" formControlName="ObserverTeacherID" placeholder="Enter Observer ID">
      </div>

      <div class="form-group col-md-12">
        <label>Agreement Details</label>
        <textarea class="form-control" formControlName="Agreement" rows="3" placeholder="Enter agreement details..."></textarea>
      </div>

      <div class="form-group col-md-6">
        <label>Agreement End Date</label>
        <input type="date" class="form-control" formControlName="AgreementEndDate">
      </div>

      <div class="col-12 mt-4 d-flex gap-3">
        <button type="button" routerLink="/admin" class="btn btn-secondary">Cancel</button>
        <button type="submit" [disabled]="!addDataForm.valid || isDataUploading" class="btn btn-primary btn-submit">
          <span *ngIf="!isDataUploading">Submit Record</span>
          <span *ngIf="isDataUploading"><i class="fa fa-spinner fa-spin me-2"></i>Uploading...</span>
        </button>
      </div>
    </form>
  </div>
</div>
