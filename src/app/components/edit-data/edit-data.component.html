<div class="form-wrapper">
  <div class="glass-form-card">
    <h2 class="form-title">Edit Student Record</h2>
    <form [formGroup]="addDataForm" (ngSubmit)="onSubmit()" class="modern-form row g-4">
      <div class="form-group col-md-6">
        <label>Date</label>
        <input type="date" class="form-control" formControlName="Date">
      </div>

      <div class="form-group col-md-6">
        <label>Student Name</label>
        <input type="text" class="form-control" formControlName="StudentName">
      </div>

      <div class="form-group col-md-6">
        <label>Class</label>
        <input type="text" class="form-control" formControlName="Class">
      </div>

      <div class="form-group col-md-6">
        <label>Index Number</label>
        <input type="number" class="form-control" formControlName="sIndexNum">
      </div>

      <div class="form-group col-md-12">
        <label>Reason</label>
        <input type="text" class="form-control" formControlName="Reason">
      </div>

      <div class="form-group col-md-6">
        <label>Teacher ID</label>
        <input type="text" class="form-control" formControlName="TeacherID">
      </div>

      <div class="form-group col-md-6">
        <label>Observer Teacher ID</label>
        <input type="text" class="form-control" formControlName="ObserverTeacherID">
      </div>

      <div class="form-group col-md-12">
        <label>Agreement Details</label>
        <textarea class="form-control" formControlName="Agreement" rows="3"></textarea>
      </div>

      <div class="form-group col-md-12">
        <label>Agreement End Date</label>
        <input type="date" class="form-control" formControlName="AgreementEndDate">
      </div>

      <div class="col-12 mt-4 d-flex gap-3">
        <button type="button" routerLink="/admin" class="btn btn-secondary">Cancel</button>
        <button type="submit" class="btn btn-primary btn-submit" [disabled]="addDataForm.invalid || isDataUploading">
          <span *ngIf="!isDataUploading">Update Record</span>
          <span *ngIf="isDataUploading"><i class="fa fa-spinner fa-spin me-2"></i>Updating...</span>
        </button>
      </div>
    </form>
  </div>
</div>
